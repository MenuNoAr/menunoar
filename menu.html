<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Menu Digital</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/logo-minimal.svg?v=2">
    <link rel="stylesheet" href="css/brand.css?v=1.0">
    <link rel="stylesheet" href="css/menu.css?v=3.5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="menu-page">
    <div id="loading" class="loading-screen" role="status" aria-live="polite">
        <div class="spinner"></div>
        <p>A carregar ementa...</p>
    </div>

    <main id="mobile-view">
        <header id="heroHeader">
            <div id="coverContainer" class="cover-image">
                <div class="restaurant-logo" data-restaurant-logo hidden>
                    <img data-restaurant-logo-image alt="">
                </div>
            </div>
            <div class="header-content">
                <h1 id="restName">Restaurante</h1>
                <p id="restDesc" class="description"></p>
                <div id="infoBadges" class="info-badges"></div>
            </div>
        </header>

        <nav id="categoryTabs" class="category-tabs" aria-label="Categorias"></nav>

        <div id="menuSliderWindow" class="slider-window">
            <div id="menuSliderTrack" class="slider-track"></div>
        </div>
    </main>

    <script type="module" src="js/menu-public.js?v=1.2"></script>
</body>

</html>
