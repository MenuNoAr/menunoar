<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Gestão | Menu no Ar</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/menu.css"> <!-- For the preview canvas -->

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>

<body class="animate-fade">

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="setup-container" style="display:none;">
        <div class="card animate-fade" id="setup-choice-card"
            style="max-width: 480px; width: 100%; text-align: center;">
            <img src="assets/images/logo.svg" alt="Logo" style="height: 48px; margin-bottom: 24px;">
            <h2>Bem-vindo, <span id="setupGreetingName">!</span></h2>
            <p style="margin-bottom: 32px; color: var(--text-muted);">Como deseja começar a sua ementa digital?</p>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary" onclick="showSetupForm('scratch')">
                    <i class="ph ph-plus-circle"></i> Criar Menu do Zero
                </button>
                <button class="btn btn-secondary" onclick="showSetupForm('import')">
                    <i class="ph ph-file-pdf"></i> Importar Menu PDF
                </button>
            </div>
        </div>

        <!-- Forms hidden initially -->
        <div class="card animate-fade" id="setup-form-card" style="display:none; max-width: 400px; width: 100%;">
            <div style="margin-bottom: 24px;">
                <button class="btn btn-ghost" onclick="goBackToSetupChoice()"><i class="ph ph-arrow-left"></i>
                    Voltar</button>
            </div>
            <h3>Novo Estabelecimento</h3>
            <form id="setupForm" style="margin-top: 20px;">
                <div class="form-group">
                    <label>Nome do Restaurante</label>
                    <input type="text" id="setupName" class="form-input" placeholder="Ex: Cantinho do Sabor" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="setupDesc" class="form-input" rows="2" placeholder="Opcional..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 8px;">Criar Agora</button>
            </form>
        </div>

        <div class="card animate-fade" id="setup-import-card" style="display:none; max-width: 400px; width: 100%;">
            <div style="margin-bottom: 24px;">
                <button class="btn btn-ghost" onclick="goBackToSetupChoice()"><i class="ph ph-arrow-left"></i>
                    Voltar</button>
            </div>
            <h3>Importar PDF</h3>
            <form id="importForm" style="margin-top: 20px;">
                <div class="form-group">
                    <label>Nome do Restaurante</label>
                    <input type="text" id="importRestName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Ficheiro PDF</label>
                    <div style="border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 32px; text-align: center; cursor: pointer;"
                        onclick="document.getElementById('importFile').click()">
                        <i class="ph ph-cloud-arrow-up"
                            style="font-size: 2rem; color: var(--primary); margin-bottom: 8px;"></i>
                        <p id="pdfFileNameDisplay" style="font-size: 0.8rem; color: var(--text-muted);">Selecionar PDF
                        </p>
                        <input type="file" id="importFile" hidden accept="application/pdf"
                            onchange="window.handlePdfSelect(this)">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 8px;">Carregar e Criar</button>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="dashboard-layout" style="display:none;">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/images/logo.svg" alt="Menu no Ar" class="sidebar-logo">
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" onclick="switchView('editor')">
                    <i class="ph ph-layout"></i><span>Editor</span>
                </a>
                <a href="#" class="nav-item" onclick="openSettingsTab('design')">
                    <i class="ph ph-palette"></i><span>Design</span>
                </a>
                <a href="#" class="nav-item" onclick="openQrModal()">
                    <i class="ph ph-qr-code"></i><span>QR Code</span>
                </a>
                <a href="#" class="nav-item" onclick="openSettingsTab('billing')">
                    <i class="ph ph-credit-card"></i><span>Subscrição</span>
                </a>
            </nav>

            <div style="margin-top: auto; border-top: 1px solid var(--border-color); padding-top: 24px;">
                <button class="nav-item"
                    style="width: 100%; background: none; border: none; cursor: pointer; text-align: left;"
                    onclick="openProfileModal()">
                    <i class="ph ph-user"></i><span id="sidebarUserName">Perfil</span>
                </button>
                <button class="nav-item" onclick="signOut()"
                    style="width: 100%; background: none; border: none; cursor: pointer; text-align: left; color: var(--danger);">
                    <i class="ph ph-sign-out"></i><span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-content">
            <header class="top-bar">
                <div class="flex items-center gap-4">
                    <h2 class="view-title" id="view-title">Dashboard</h2>
                    <div id="trialTimer"></div>
                </div>

                <div class="flex items-center gap-2">
                    <button class="btn btn-secondary" id="liveLinkBtn"><i class="ph ph-eye"></i> Online</button>
                    <button class="btn btn-primary" onclick="window.addNewCategoryOptimized()"><i
                            class="ph ph-plus"></i> Categoria</button>
                    <button class="btn btn-ghost" onclick="toggleDarkMode()" title="Mudar Tema"><i id="themeIcon"
                            class="ph ph-moon"></i></button>
                </div>
            </header>

            <div class="editor-workspace">
                <div id="categoryNav"></div>

                <!-- PREVIEW DEVICE -->
                <div class="editor-canvas animate-fade" id="menuContainer">
                    <div class="canvas-content">
                        <!-- Header Content -->
                        <div id="coverEditor" class="editable-area"
                            style="height: 180px; background: #f3f4f6; position: relative;"
                            onclick="triggerCoverUpload()">
                            <div class="edit-hint">Alterar Capa</div>
                        </div>

                        <div style="padding: 32px 24px; text-align: center;">
                            <h1 id="restNameEditor" class="inline-editable">Estabelecimento</h1>
                            <p id="restDescEditor" class="inline-editable"
                                style="color: var(--text-muted); font-size: 0.9rem;">Descrição do restaurante...</p>

                            <div class="flex items-center justify-center gap-2" style="margin-top: 20px;">
                                <div id="badgeWifi" class="badge"
                                    style="background: var(--primary-soft); color: var(--primary);"><i
                                        class="ph ph-wifi"></i> <span id="textWifi"></span></div>
                                <div id="badgePhone" class="badge"
                                    style="background: var(--primary-soft); color: var(--primary);"><i
                                        class="ph ph-phone"></i> <span id="textPhone"></span></div>
                            </div>
                        </div>

                        <!-- Menu Track -->
                        <div id="menuSections">
                            <div id="editorTrack" class="slider-track"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODALS -->

    <!-- Item Modal -->
    <div id="itemModal" class="modal-backdrop" onclick="if(event.target===this) closeModal('itemModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Item</h2>
                <button class="btn btn-ghost" onclick="closeModal('itemModal')"><i class="ph ph-x"></i></button>
            </div>
            <form id="itemEditForm">
                <input type="hidden" id="editItemId">
                <input type="hidden" id="editItemCat">
                <div class="form-group">
                    <label>Nome do Prato</label>
                    <input type="text" id="editItemName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Preço (€)</label>
                    <input type="number" step="0.01" id="editItemPrice" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="editItemDesc" class="form-input" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 12px;">Guardar Alterações</button>
            </form>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal-backdrop" onclick="if(event.target===this) closeModal('imageModal')">
        <div class="modal-content" style="text-align: center;">
            <div class="modal-header">
                <h2>Imagem do Item</h2>
                <button class="btn btn-ghost" onclick="closeModal('imageModal')"><i class="ph ph-x"></i></button>
            </div>
            <div id="imgPreviewContainer"
                style="margin: 24px 0; aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden; background: var(--bg-page); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color);">
                <img id="imgPreviewDisplay" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                <div id="imgPreviewPlaceholder" style="color: var(--text-muted);"><i class="ph ph-image"
                        style="font-size: 2.5rem;"></i></div>
            </div>
            <input type="file" id="modalImageUpload" hidden accept="image/*">
            <div class="flex items-center justify-center gap-4">
                <button class="btn btn-primary" id="btnChangeImage"><i class="ph ph-camera"></i> Alterar</button>
                <button class="btn btn-ghost" id="btnRemoveImage" style="color: var(--danger);"><i
                        class="ph ph-trash"></i> Remover</button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal-backdrop" onclick="if(event.target===this) closeModal('profileModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>O Meu Perfil</h2>
                <button class="btn btn-ghost" onclick="closeModal('profileModal')"><i class="ph ph-x"></i></button>
            </div>
            <form id="profileForm">
                <div class="form-group"><label>Nome</label><input type="text" id="profileName" class="form-input"
                        required></div>
                <div class="form-group"><label>Estabelecimento</label><input type="text" id="profileEstablishment"
                        class="form-input"></div>
                <div class="form-group"><label>Email de Contacto</label><input type="email" id="profileEmail"
                        class="form-input"></div>
                <div class="form-group"><label>Telemóvel</label><input type="tel" id="profilePhone" class="form-input">
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; margin-top: 12px;">Atualizar Perfil</button>
            </form>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="modal-backdrop" onclick="if(event.target===this) closeModal('qrModal')">
        <div class="modal-content" style="text-align: center;">
            <div class="modal-header">
                <h2>O seu QR Code</h2>
                <button class="btn btn-ghost" onclick="closeModal('qrModal')"><i class="ph ph-x"></i></button>
            </div>
            <div id="qr-code-container" style="margin: 24px auto;"></div>
            <p id="qrRestaurantName" style="font-weight: 700; font-size: 1.1rem;"></p>
            <button class="btn btn-secondary" onclick="downloadQr()" style="margin-top: 24px; width: 100%;"><i
                    class="ph ph-download"></i> Descarregar PNG</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-backdrop" onclick="if(event.target===this) closeModal('settingsModal')">
        <div class="modal-content"
            style="max-width: 650px; padding: 0; overflow: hidden; display: flex; height: 500px;">
            <div
                style="width: 180px; background: var(--bg-page); border-right: 1px solid var(--border-color); padding: 24px 12px;">
                <h4 style="margin-bottom: 20px; padding-left: 12px;">Definições</h4>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <button class="nav-item btn-ghost" onclick="switchSettingsTab('general')" id="tab-btn-general"
                        style="font-size: 0.85rem;">Geral</button>
                    <button class="nav-item btn-ghost" onclick="switchSettingsTab('design')" id="tab-btn-design"
                        style="font-size: 0.85rem;">Design</button>
                    <button class="nav-item btn-ghost" onclick="switchSettingsTab('billing')" id="tab-btn-billing"
                        style="font-size: 0.85rem;">Subscrição</button>
                </div>
            </div>
            <div style="flex: 1; padding: 32px; display: flex; flex-direction: column;">
                <form id="settingsForm" style="height: 100%; display: flex; flex-direction: column;">
                    <div id="tab-general" class="settings-tab-pane">
                        <div class="form-group">
                            <label>Link do Menu (Slug)</label>
                            <input type="text" id="modalSlug" class="form-input">
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                            <input type="checkbox" id="pdfToggle" onchange="togglePdfDetails()">
                            <label style="margin-bottom: 0;">Usar Modo PDF</label>
                        </div>
                    </div>
                    <!-- Other tabs omitted for brevity in template, logic remains -->
                    <div style="margin-top: auto; display: flex; gap: 12px;">
                        <button type="button" class="btn btn-secondary"
                            onclick="closeModal('settingsModal')">Fechar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
