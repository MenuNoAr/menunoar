<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub | Menu no Ar</title>

    <!-- Design tokens -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="hub-body">

    <!-- OVERLAYS: Setup Screen -->
    <div id="setup-screen" class="hub-overlay" style="display:none;">
        <div class="setup-window animate-fade">
            <header class="setup-head">
                <img src="assets/images/logo.svg" alt="Logo" class="hub-logo">
                <h1>Vamos criar o seu Menu</h1>
                <p>Escolha a base para o seu novo espaço digital.</p>
            </header>

            <div class="setup-grid">
                <button class="setup-card-btn" onclick="showSetupForm('scratch')">
                    <i class="ph-fill ph-plus-circle"></i>
                    <div class="card-info">
                        <strong>Menu Digital</strong>
                        <span>Editor Visual Dinâmico</span>
                    </div>
                </button>
                <button class="setup-card-btn" onclick="showSetupForm('import')">
                    <i class="ph-fill ph-file-pdf"></i>
                    <div class="card-info">
                        <strong>Menu em PDF</strong>
                        <span>Upload e Conversão Quick</span>
                    </div>
                </button>
            </div>

            <!-- Hidden Forms -->
            <form id="setupForm" class="setup-inner-form" style="display:none;">
                <input type="text" id="setupName" placeholder="Nome do Restaurante" required
                    oninput="generateSlug(this.value)">
                <div class="slug-preview">menunoar.pt/<input type="text" id="setupSlug" readonly></div>
                <button type="submit" class="hub-btn block primary">Criar Dashboard <i
                        class="ph ph-arrow-right"></i></button>
                <button type="button" class="hub-btn block ghost" onclick="goBackToSetupChoice()">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP: The Command Hub -->
    <div id="main-dashboard" class="hub-container" style="display:none;">

        <!-- HEADER -->
        <header class="hub-topbar">
            <div class="top-left">
                <a href="/" class="brand-link">
                    <img src="assets/images/logo.svg" alt="Menu no Ar" id="hubLogo">
                </a>
                <div class="hub-divider"></div>
                <div class="location-path">
                    <span class="muted">Painel</span>
                    <i class="ph ph-caret-right"></i>
                    <strong id="sidebarUserName">Restaurante</strong>
                </div>
            </div>

            <div class="top-center">
                <nav class="hub-nav">
                    <button class="nav-tab active" onclick="switchView('editor')">Menu</button>
                    <button class="nav-tab" onclick="openSettingsModal()">Design</button>
                    <button class="nav-tab" onclick="openQrModal()">QR Code</button>
                </nav>
            </div>

            <div class="top-right">
                <div id="trialTimer" class="status-pill trial">30 dias restantes</div>
                <button class="icon-btn" onclick="toggleDarkMode()">
                    <i id="themeIcon" class="ph ph-moon"></i>
                </button>
                <button class="profile-trigger" onclick="openProfileModal()">
                    <span id="userDisplayName">U</span>
                </button>
            </div>
        </header>

        <!-- SPLIT CANVAS -->
        <main class="hub-workspace">

            <!-- LEFT: THE BLUEPRINT -->
            <section class="hub-blueprint" id="menu-blueprint">
                <div class="blueprint-header">
                    <h2>Ementa</h2>
                    <div class="blueprint-actions">
                        <button class="hub-btn primary sm" onclick="addNewCategoryOptimized()">
                            <i class="ph ph-plus"></i> Categoria
                        </button>
                    </div>
                </div>

                <div id="categories-list" class="blueprint-content">
                    <!-- JS Injects Categories using Bento Cards -->
                    <div class="hub-loading">
                        <i class="ph ph-spinner fa-spin"></i>
                    </div>
                </div>
            </section>

            <!-- RIGHT: THE STUDIO (LIVE PREVIEW) -->
            <section class="hub-studio">
                <div class="studio-tools">
                    <button class="tool-btn" onclick="togglePreviewMode('mobile')"><i
                            class="ph ph-smartphone"></i></button>
                    <button class="tool-btn" onclick="togglePreviewMode('tablet')"><i class="ph ph-tablet"></i></button>
                    <div class="hub-divider"></div>
                    <button class="hub-btn pro-action" id="liveLinkBtn">
                        <i class="ph ph-arrow-square-out"></i> Abrir Link Público
                    </button>
                </div>

                <div class="studio-canvas" id="canvas-wrapper">
                    <div id="menuContainer" class="studio-preview-card">
                        <!-- THE ACTUAL LIVE PREVIEW INJECTED HERE -->
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- MODALS -->

    <!-- Settings Modal -->
    <div id="settingsModal" class="hub-modal-overlay" onclick="if(event.target===this) closeModal('settingsModal')">
        <div class="hub-modal-window wide">
            <div class="modal-sidebar">
                <button class="m-nav-btn active" id="tab-btn-design"
                    onclick="switchSettingsTab('design')">Design</button>
                <button class="m-nav-btn" id="tab-btn-general" onclick="switchSettingsTab('general')">Geral</button>
                <button class="m-nav-btn" id="tab-btn-billing" onclick="switchSettingsTab('billing')">Conta</button>
            </div>
            <div class="modal-main">
                <div class="modal-header">
                    <h3 id="settingsTitle">Identidade Visual</h3>
                    <button class="close-modal" onclick="closeModal('settingsModal')"><i class="ph ph-x"></i></button>
                </div>
                <form id="settingsForm" class="modal-form">
                    <div id="tab-design" class="m-pane">
                        <div class="f-group">
                            <label>Tipo de Letra Principal</label>
                            <select id="modalFont" class="hub-input">
                                <option value="Inter">Inter (Clean)</option>
                                <option value="Outfit">Outfit (Moderna)</option>
                                <option value="Playfair Display">Sério / Elegante</option>
                            </select>
                        </div>
                    </div>
                    <div id="tab-general" class="m-pane" style="display:none;">
                        <div class="f-group">
                            <label>Link (Slug)</label>
                            <input type="text" id="modalSlug" class="hub-input">
                        </div>
                        <div class="pdf-card">
                            <div class="info">
                                <strong>Utilizar PDF</strong>
                                <span>Ignorar editor digital</span>
                            </div>
                            <label class="hub-switch">
                                <input type="checkbox" id="pdfToggle" onchange="togglePdfDetails()">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div id="pdfDetails" style="display:none; margin-top:20px;">
                            <input type="file" id="pdfUploadInput" accept="application/pdf" class="hub-input">
                        </div>
                    </div>
                    <div id="tab-billing" class="m-pane" style="display:none;">
                        <div class="status-box">
                            <p>Plano Selecionado:</p>
                            <strong id="billingStatusText">Profissional</strong>
                        </div>
                        <button type="button" class="hub-btn primary" id="btnActionBilling">Gerir Assinatura</button>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="hub-btn primary">Guardar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Profile/Account Modal -->
    <div id="profileModal" class="hub-modal-overlay" onclick="if(event.target===this) closeModal('profileModal')">
        <div class="hub-modal-window small">
            <div class="modal-header">
                <h3>Minha Conta</h3>
                <button class="close-modal" onclick="closeModal('profileModal')"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="profile-top">
                    <div class="avatar-large" id="avatarLarge">U</div>
                    <h4 id="profileEmail">email@user.com</h4>
                </div>
                <button class="hub-btn danger block" onclick="signOut()">Sair da Conta <i
                        class="ph ph-sign-out"></i></button>
                <button class="hub-btn ghost block" onclick="promptDeleteRestaurant()">Apagar Restaurante</button>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="hub-modal-overlay" onclick="if(event.target===this) closeModal('qrModal')">
        <div class="hub-modal-window small">
            <div class="modal-header">
                <h3>QR Code do Menu</h3>
                <button class="close-modal" onclick="closeModal('qrModal')"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body align-center">
                <div id="qr-code-container" class="qr-box"></div>
                <p id="qrRestaurantName" class="bold">Nome</p>
                <button class="hub-btn block primary" onclick="downloadQr()"><i class="ph ph-download"></i> Baixar
                    PNG</button>
            </div>
        </div>
    </div>

    <!-- Item Editor Modal (The Blueprint focused one) -->
    <div id="itemModal" class="hub-modal-overlay" onclick="if(event.target===this) closeModal('itemModal')">
        <div class="hub-modal-window">
            <div class="modal-header">
                <h3 id="modalTitle">Prato</h3>
                <button class="close-modal" onclick="closeModal('itemModal')"><i class="ph ph-x"></i></button>
            </div>
            <form id="itemEditForm" class="modal-form">
                <input type="hidden" id="editItemId">
                <input type="hidden" id="editItemCat">

                <div class="f-group">
                    <label>Título do Prato</label>
                    <input type="text" id="editItemName" class="hub-input" placeholder="Ex: Risoto de Trufa" required>
                </div>
                <div class="f-row">
                    <div class="f-group">
                        <label>Preço (€)</label>
                        <input type="number" step="0.01" id="editItemPrice" class="hub-input" required>
                    </div>
                    <div class="f-group">
                        <label>Esgotado?</label>
                        <select id="editItemVisibility" class="hub-input">
                            <option value="true">Disponível</option>
                            <option value="false">Esgotado</option>
                        </select>
                    </div>
                </div>
                <div class="f-group">
                    <label>Descrição</label>
                    <textarea id="editItemDesc" class="hub-input" rows="3"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="hub-btn primary block">Guardar Informação</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="hub-modal-overlay" onclick="if(event.target===this) closeModal('imageModal')">
        <div class="hub-modal-window">
            <div class="modal-header">
                <h3>Imagem do Item</h3>
                <button class="close-modal" onclick="closeModal('imageModal')"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body align-center">
                <div class="img-preview" id="imgPreviewZone">
                    <img id="imgPreviewDisplay" style="display:none;">
                    <i class="ph ph-image-square"></i>
                </div>
                <input type="file" id="modalImageUpload" hidden accept="image/*">
                <div class="img-actions">
                    <button class="hub-btn primary" id="btnChangeImage"><i class="ph ph-camera"></i> Carregar</button>
                    <button class="hub-btn ghost text-danger" id="btnRemoveImage">Remover</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script type="module" src="js/dashboard.js"></script>

</body>

</html>
