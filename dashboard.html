<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor | Menu no Ar</title>

    <!-- Base + Theme Integration -->
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <!-- Simple & Functional Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="zen-body">

    <!-- TOP HUD -->
    <header class="zen-hud">
        <div class="hud-left">
            <img src="assets/logo.png" alt="Menu no Ar" class="hud-logo-img">
        </div>
        <div class="hud-actions">
            <button class="hud-btn" title="Dashboard"><i class="ph ph-squares-four"></i></button>
            <button class="hud-btn" id="liveLinkBtn" title="Ver Menu"><i class="ph ph-arrow-square-out"></i></button>
            <button class="hud-btn" onclick="openSettingsModal()" title="Definições"><i class="ph ph-gear"></i></button>
            <button class="hud-btn" onclick="toggleDarkMode()" title="Tema"><i id="themeIcon"
                    class="ph ph-moon"></i></button>
            <button class="hud-btn premium" title="Premium"><i class="ph ph-crown"></i></button>
            <div class="hud-btn-badge">
                <button class="hud-btn" title="Tutorial"><i class="ph ph-graduation-cap"></i></button>
                <span class="badge-tag">NOVO</span>
            </div>
            <button class="hud-btn exit" onclick="signOut()" title="Sair"><i class="ph ph-sign-out"></i></button>
        </div>
    </header>

    <!-- THE STAGE -->
    <main class="zen-stage">
        <div id="editor-container" class="zen-canvas">
            <!-- Master Cover Upload -->
            <div class="cover-container" onclick="window.triggerCoverUpload()">
                <img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=2070" id="coverDisplay">
                <div class="cover-fade"></div>
            </div>

            <!-- Restaurant Identity -->
            <div class="rest-identity">
                <h1 id="restName" contenteditable="true">Taberna do Mercado</h1>
                <p id="restDesc" contenteditable="true">Sabores autênticos da cozinha portuguesa...</p>

                <div class="rest-meta">
                    <div class="meta-item"><i class="ph-fill ph-wifi-high"></i> <span contenteditable="true"
                            id="metaWifi">taberna_gratis</span></div>
                    <div class="meta-item"><i class="ph-fill ph-phone"></i> <span contenteditable="true"
                            id="metaPhone">+351 210 999 888</span></div>
                    <div class="meta-item"><i class="ph-fill ph-map-pin"></i> <span contenteditable="true"
                            id="metaAddr">Rua Augusta, 150, Lisboa</span></div>
                </div>
            </div>

            <!-- Category Navigation -->
            <nav id="categoryNav" class="category-grid-nav"></nav>

            <!-- Sliding Menu Content -->
            <div id="menuContainer" class="menu-slider-viewport"></div>
        </div>
    </main>

    <!-- Minimal Floating Action (Add Category) -->
    <button class="zen-fab" onclick="addNewCategoryOptimized()" title="Nova Categoria">
        <i class="ph ph-plus"></i>
    </button>

    <!-- MODALS (Ultra-Minimalist) -->

    <!-- Settings Modal (Advanced) -->
    <div id="settingsModal" class="zen-modal" style="display:none;"
        onclick="if(event.target===this) closeModal('settingsModal')">
        <div class="zen-modal-content">
            <header>
                <h3>Configurações</h3>
            </header>
            <form id="settingsForm" class="zen-form">
                <div class="f-group">
                    <label>Tipo de Letra</label>
                    <select id="modalFont" class="z-input">
                        <option value="Inter">Inter (Clean)</option>
                        <option value="Outfit">Outfit (Bold)</option>
                        <option value="Playfair Display">Elegante</option>
                    </select>
                </div>
                <div class="f-group">
                    <label>Cor de Acento</label>
                    <div class="color-presets">
                        <button type="button" class="color-pip" data-color="#1fa8ff"
                            style="background:#1fa8ff"></button>
                        <button type="button" class="color-pip" data-color="#10b981"
                            style="background:#10b981"></button>
                        <button type="button" class="color-pip" data-color="#f59e0b"
                            style="background:#f59e0b"></button>
                        <button type="button" class="color-pip" data-color="#ef4444"
                            style="background:#ef4444"></button>
                        <button type="button" class="color-pip" data-color="#000000"
                            style="background:#000000"></button>
                    </div>
                    <input type="hidden" id="modalAccent" value="#1fa8ff">
                </div>
                <div class="f-group">
                    <label>Estilo de Menu</label>
                    <div class="menu-type-toggle">
                        <label><input type="radio" name="mtype" value="digital" checked> Digital</label>
                        <label><input type="radio" name="mtype" value="pdf"> PDF</label>
                    </div>
                </div>
                <div class="modal-btns">
                    <button type="submit" class="z-btn primary block">Guardar</button>
                    <button type="button" class="z-btn block" onclick="closeModal('settingsModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Profile/Auth Modal -->
    <div id="profileModal" class="zen-modal" style="display:none;"
        onclick="if(event.target===this) closeModal('profileModal')">
        <div class="zen-modal-content">
            <header>
                <h3>Definições</h3>
            </header>
            <div class="modal-body">
                <p class="muted" id="profileEmail">...</p>
                <div class="modal-btns">
                    <button class="z-btn danger" onclick="signOut()">Sair da Conta</button>
                    <button class="z-btn" onclick="closeModal('profileModal')">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="zen-modal" style="display:none;" onclick="if(event.target===this) closeModal('qrModal')">
        <div class="zen-modal-content small">
            <div id="qr-code-container" class="zen-qr-box"></div>
            <div class="modal-btns">
                <button class="z-btn primary block" onclick="downloadQr()">Baixar QR Code</button>
                <button class="z-btn block" onclick="closeModal('qrModal')">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Background Setup Overlay -->
    <div id="setup-screen" class="zen-overlay" style="display:none;">
        <div class="zen-setup-card">
            <h2>Bem-vindo</h2>
            <p>Dê um nome ao seu novo menu digital.</p>
            <form id="setupForm" class="zen-setup-form">
                <input type="text" id="setupName" placeholder="Nome do Restaurante" required
                    oninput="generateSlug(this.value)">
                <div class="slug-hint">menunoar.pt/<span id="slug-view">...</span></div>
                <input type="hidden" id="setupSlug">
                <button type="submit" class="z-btn primary">Criar e Editar <i class="ph ph-pencil-simple"></i></button>
            </form>
        </div>
    </div>

    <!-- Logic -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
