<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor | Menu no Ar</title>

    <!-- Base + Theme Integration -->
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <!-- Design Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="zen-body">

    <!-- GLOBAL HUD (Minimal fixed top bar) -->
    <header class="zen-hud">
        <div class="hud-left">
            <a href="/" class="hud-logo"><img src="assets/images/logo.svg" alt="logo"></a>
            <div class="hud-sep"></div>
            <div class="hud-status">
                <div class="dot green"></div> <span id="sidebarUserName">...</span>
            </div>
        </div>

        <div class="hud-actions">
            <button class="hud-btn" id="liveLinkBtn" title="Ver Link Público"><i
                    class="ph ph-arrow-square-out"></i></button>
            <button class="hud-btn" onclick="openQrModal()" title="Código QR"><i class="ph ph-qr-code"></i></button>
            <button class="hud-btn" onclick="toggleDarkMode()" title="Tema"><i id="themeIcon"
                    class="ph ph-moon"></i></button>
            <button class="hud-user" onclick="openProfileModal()" id="userDisplayName">U</button>
        </div>
    </header>

    <!-- THE STAGE (Centered Editor) -->
    <main class="zen-stage">
        <div id="editor-container" class="zen-canvas">
            <!-- This is the direct Menu Editor -->
            <div id="menuContainer" class="zen-menu-root">
                <div class="zen-loading">A carregar o seu espaço...</div>
            </div>
        </div>
    </main>

    <!-- Minimal Floating Action (Add Category) -->
    <button class="zen-fab" onclick="addNewCategoryOptimized()" title="Nova Categoria">
        <i class="ph ph-plus"></i>
    </button>

    <!-- MODALS (Ultra-Minimalist) -->

    <!-- Profile/Auth Modal -->
    <div id="profileModal" class="zen-modal" style="display:none;"
        onclick="if(event.target===this) closeModal('profileModal')">
        <div class="zen-modal-content">
            <header>
                <h3>Definições</h3>
            </header>
            <div class="modal-body">
                <p class="muted" id="profileEmail">...</p>
                <div class="modal-btns">
                    <button class="z-btn danger" onclick="signOut()">Sair da Conta</button>
                    <button class="z-btn" onclick="closeModal('profileModal')">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="zen-modal" style="display:none;" onclick="if(event.target===this) closeModal('qrModal')">
        <div class="zen-modal-content small">
            <div id="qr-code-container" class="zen-qr-box"></div>
            <div class="modal-btns">
                <button class="z-btn primary block" onclick="downloadQr()">Baixar QR Code</button>
                <button class="z-btn block" onclick="closeModal('qrModal')">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Background Setup Overlay -->
    <div id="setup-screen" class="zen-overlay" style="display:none;">
        <div class="zen-setup-card">
            <h2>Bem-vindo</h2>
            <p>Dê um nome ao seu novo menu digital.</p>
            <form id="setupForm" class="zen-setup-form">
                <input type="text" id="setupName" placeholder="Nome do Restaurante" required
                    oninput="generateSlug(this.value)">
                <div class="slug-hint">menunoar.pt/<span id="slug-view">...</span></div>
                <input type="hidden" id="setupSlug">
                <button type="submit" class="z-btn primary">Criar e Editar <i class="ph ph-pencil-simple"></i></button>
            </form>
        </div>
    </div>

    <!-- Logic -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
